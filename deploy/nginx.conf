server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Single-page-app fallback is NOT enabled. MkDocs generates real pages.
  location / {
    try_files $uri $uri/ =404;
  }

  # Cache static assets aggressively (Material theme assets are fingerprinted).
  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}

